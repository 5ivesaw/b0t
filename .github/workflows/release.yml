name: Manual Release Recovery

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version override. Leave blank to use sawbotVersion from gradle.properties.'
        required: false
        type: string
      prerelease:
        description: 'Publish as a prerelease'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: manual-release-${{ github.ref }}-${{ inputs.version || 'repository-version' }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Rebuild and publish recovery release
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: release_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          REPOSITORY_VERSION="$(bash tools/read-version.sh)"
          VERSION="${INPUT_VERSION:-$REPOSITORY_VERSION}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$INPUT_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Install Java 8 toolchain
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Remember Java 8 path
        shell: bash
        run: echo "JAVA8_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up Java 17 for Gradle
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure Gradle 8.8
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.8'

      - name: Register Java 8 toolchain
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          echo "org.gradle.java.installations.paths=$JAVA8_HOME" >> "$HOME/.gradle/gradle.properties"

      - name: Verify contracts, telemetry, navigation, bridging, and safety
        run: bash tools/offline-verify.sh

      - name: Build release
        env:
          SAWBOT_VERSION: ${{ steps.release_meta.outputs.version }}
        run: gradle --no-daemon --stacktrace clean ciBuild

      - name: Package and verify release assets
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          bash tools/package-release.sh "$VERSION"
          bash tools/verify-release-payload.sh "$VERSION" dist

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_meta.outputs.tag }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; refusing to overwrite it." >&2
            exit 1
          fi

          FLAGS=(--target "$GITHUB_SHA" --title "SawBotV1 $VERSION" --notes-file dist/release-notes.md)
          if [[ "$PRERELEASE" == "true" ]]; then FLAGS+=(--prerelease); fi

          gh release create "$TAG" \
            "dist/SawBotV1-$VERSION-mc1.8.9.jar" \
            "dist/SawBotV1-$VERSION-sources.jar" \
            "dist/SHA256SUMS.txt" \
            "dist/PHASE11_REPORT.md" \
            "dist/REFERENCE_BODY_RESEARCH.md" \
            "dist/VISUALIZATION_LIFECYCLE.md" \
            "dist/PHASE10_REPORT.md" \
            "dist/CONTINUOUS_ANYTIME_NAVIGATION.md" \
            "dist/PHASE9_REPORT.md" \
            "dist/SEGMENTED_NAVIGATION_CORE.md" \
            "dist/BARITONE_ARCHITECTURE_RESEARCH.md" \
            "dist/PHASE8_REPORT.md" \
            "dist/BRIDGING_BODY.md" \
            "dist/PHASE7_REPORT.md" \
            "dist/ADAPTIVE_NAVIGATION.md" \
            "dist/PHASE6_REPORT.md" \
            "dist/HYBRID_ARCHITECTURE.md" \
            "dist/NAVIGATION_BODY.md" \
            "dist/PHASE5_REPORT.md" \
            "dist/WAYPOINT_MODEL.md" \
            "dist/PHASE4_RUNTIME_FINDINGS.md" \
            "dist/waypoint_v0.1.json" \
            "dist/waypoint_eval_v0.1.json" \
            "dist/waypoint_failures_v0.1.jsonl" \
            "dist/PHASE4_REPORT.md" \
            "dist/MODEL_BRIDGE_PROTOCOL.md" \
            "dist/PHASE3_RUNTIME_STATUS.md" \
            "dist/PHASE3_REPORT.md" \
            "dist/TELEMETRY_FORMAT.md" \
            "dist/PHASE2_ACCEPTANCE.md" \
            "dist/PHASE1_ACCEPTANCE.md" \
            "dist/PHASE0_ACCEPTANCE.md" \
            "dist/GITHUB_RELEASES.md" \
            "${FLAGS[@]}"
