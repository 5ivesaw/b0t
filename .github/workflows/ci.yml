name: CI and automatic release

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  metadata:
    name: Resolve repository version
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(bash tools/read-version.sh)"
          TAG="v$VERSION"
          if [[ "$VERSION" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG"

  offline-verification:
    name: Offline contracts and safety checks
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Run offline verifier
        run: bash tools/offline-verify.sh

      - name: Validate scripts
        run: |
          bash -n gradlew
          bash -n tools/offline-verify.sh
          bash -n tools/package-release.sh
          bash -n tools/read-version.sh
          python3 -m py_compile tools/verify-built-jar.py
          python3 -m py_compile sawbot-tools/dataset-validator/validate_telemetry.py
          python3 -m py_compile sawbot-tools/replay-inspector/inspect_telemetry.py

  forge-build:
    name: Build Forge 1.8.9 mod
    needs: metadata
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Java 8 toolchain
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Remember Java 8 path
        shell: bash
        run: echo "JAVA8_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up Java 17 for Gradle
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure Gradle 8.8
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.8'

      - name: Register Java 8 toolchain
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          echo "org.gradle.java.installations.paths=$JAVA8_HOME" >> "$HOME/.gradle/gradle.properties"

      - name: Build
        env:
          SAWBOT_VERSION: ${{ needs.metadata.outputs.version }}
        run: gradle --no-daemon --stacktrace clean ciBuild

      - name: Package and verify artifact
        run: bash tools/package-release.sh "${{ needs.metadata.outputs.version }}"

      - name: Upload Forge artifact
        uses: actions/upload-artifact@v7
        with:
          name: SawBotV1-${{ needs.metadata.outputs.version }}
          path: |
            dist/SawBotV1-${{ needs.metadata.outputs.version }}-mc1.8.9.jar
            dist/SawBotV1-${{ needs.metadata.outputs.version }}-sources.jar
            dist/SHA256SUMS.txt
            dist/release-notes.md
            dist/PHASE3_REPORT.md
            dist/TELEMETRY_FORMAT.md
            dist/PHASE2_REPORT.md
            dist/PHASE2_RUNTIME_FEEDBACK.md
            dist/PHASE2_RUNTIME_VALIDATION.md
            dist/PHASE1_ACCEPTANCE.md
            dist/PHASE0_ACCEPTANCE.md
            dist/GITHUB_RELEASES.md
            dist/PHASE2_UI_REVERT.md
          if-no-files-found: error
          retention-days: 30

  automatic-release:
    name: Publish release automatically
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [metadata, offline-verification, forge-build]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout exact tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download tested build
        uses: actions/download-artifact@v8
        with:
          name: SawBotV1-${{ needs.metadata.outputs.version }}
          path: dist

      - name: Verify downloaded release payload
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          bash tools/verify-release-payload.sh "$VERSION" dist

      - name: Refuse duplicate or reused version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Bump sawbotVersion before pushing new code to main."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists without a usable release. Use the Manual Release Recovery workflow or bump sawbotVersion."
            exit 1
          fi
          echo "Version $VERSION is available for automatic publication."

      - name: Create tag and publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        run: |
          set -euo pipefail
          FLAGS=(--target "$GITHUB_SHA" --title "SawBotV1 $VERSION" --notes-file dist/release-notes.md)
          if [[ "$PRERELEASE" == "true" ]]; then FLAGS+=(--prerelease); fi

          gh release create "$TAG" \
            "dist/SawBotV1-$VERSION-mc1.8.9.jar" \
            "dist/SawBotV1-$VERSION-sources.jar" \
            "dist/SHA256SUMS.txt" \
            "dist/PHASE3_REPORT.md" \
            "dist/TELEMETRY_FORMAT.md" \
            "dist/PHASE2_REPORT.md" \
            "dist/PHASE2_RUNTIME_FEEDBACK.md" \
            "dist/PHASE2_RUNTIME_VALIDATION.md" \
            "dist/PHASE1_ACCEPTANCE.md" \
            "dist/PHASE0_ACCEPTANCE.md" \
            "dist/GITHUB_RELEASES.md" \
            "dist/PHASE2_UI_REVERT.md" \
            "${FLAGS[@]}"

          {
            echo "## Automatic release published"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Tag: \`$TAG\`"
            echo "- Tested commit: \`$GITHUB_SHA\`"
            echo "- Release: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"
          } >> "$GITHUB_STEP_SUMMARY"
