name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-verification:
    name: Offline contracts and safety checks
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Run offline verifier
        run: bash tools/offline-verify.sh

      - name: Validate scripts
        run: |
          bash -n gradlew
          bash -n tools/offline-verify.sh
          bash -n tools/package-release.sh
          python3 -m py_compile tools/verify-built-jar.py

  forge-build:
    name: Build Forge 1.8.9 mod
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Java 8 toolchain
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Remember Java 8 path
        shell: bash
        run: echo "JAVA8_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up Java 17 for Gradle
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure Gradle 8.8
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.8'

      - name: Register Java 8 toolchain
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          echo "org.gradle.java.installations.paths=$JAVA8_HOME" >> "$HOME/.gradle/gradle.properties"

      - name: Build
        run: gradle --no-daemon --stacktrace clean ciBuild

      - name: Package CI artifact
        run: bash tools/package-release.sh 0.3.0-alpha.1

      - name: Upload Forge artifact
        uses: actions/upload-artifact@v7
        with:
          name: SawBotV1-Phase2
          path: |
            dist/SawBotV1-0.3.0-alpha.1-mc1.8.9.jar
            dist/SawBotV1-0.3.0-alpha.1-sources.jar
            dist/SHA256SUMS.txt
            dist/PHASE2_REPORT.md
            dist/PHASE2_RUNTIME_FEEDBACK.md
            dist/PHASE1_ACCEPTANCE.md
            dist/PHASE0_ACCEPTANCE.md
          if-no-files-found: error
          retention-days: 14
